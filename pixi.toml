[workspace]
authors = ["Scott Henderson <3924836+scottyhq@users.noreply.github.com>"]
channels = ["conda-forge"]
name = "deep-snow"
platforms = ["osx-arm64", "linux-64"]
version = "0.1.0"

[dependencies]
pytorch = ">=2.5.1,<3"
rioxarray = ">=0.19.0,<0.20"
ipykernel = ">=7.2.0,<8"
matplotlib = ">=3.10.9,<4"
torchvision = ">=0.20.1,<0.21"
nb_conda_kernels = ">=2.5.1,<3"
seaborn = ">=0.13.2,<0.14"
h5netcdf = ">=1.8.1,<2"
planetary-computer = ">=1.0.0,<2"
geopandas = ">=1.1.3,<2"
odc-stac = ">=0.5.2,<0.6"
tqdm = ">=4.67.3,<5"
dask = ">=2026.3.0,<2027"
xdem = ">=0.2.2,<0.3"
pytest = ">=9.0.3,<10"

[pypi-dependencies]
deep-snow = {path = ".", editable = true}

[tasks]
predict-example = 'deep-snow predict-sd 20240320 20230910 "-108.20 37.55 -108.00 37.75" 25'
test = 'pytest -q tests'


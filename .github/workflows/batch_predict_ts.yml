# Batch predict snow depth over many tiles
name: batch_sd_timeseries
run-name: snow depth time series ${{ inputs.begin_date }}-${{ inputs.end_date }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
    inputs:
        begin_date:
            type: string
            required: true
            description: Earliest prediction date in YYYYmmdd format.
            default: '20240101'
        end_date:
            type: string
            required: true
            description: Latest prediction date in YYYYmmdd format.
            default: '20240320'
        snow_off_day:
            type: string
            required: true
            description: Snow-off month and day in mmdd format, usually a late-summer date such as 0901.
            default: '0901'
        aoi:
            type: string
            required: true
            description: Bounding box in format 'minlon minlat maxlon maxlat'.
            default: '-108.20 37.55 -108.00 37.75'
        cloud_cover:
            type: string
            required: true
            description: Maximum allowed Sentinel-2 cloud cover percentage.
            default: '25'
        selection_strategy:
            type: choice
            required: false
            description: Acquisition selection strategy for both Sentinel-1 and Sentinel-2.
            default: 'composite'
            options:
            - 'composite'
            - 'nearest_usable'
        s1_orbit_selection:
            type: choice
            required: false
            description: Sentinel-1 orbit selection.
            default: 'descending'
            options:
            - 'descending'
            - 'all'
        use_ensemble:
            type: choice
            required: true
            description: Use the current ensemble defaults instead of the recommended single model.
            default: 'False'
            options:
            - 'False'
            - 'True'
        predict_swe:
            type: choice
            required: false
            description: Also derive snow density and SWE from predicted depth.
            default: 'False'
            options:
            - 'False'
            - 'True'

jobs:
  # The output of this job is a JSON mapping for a matrix job
  prep_dates:
    runs-on: ubuntu-latest
    outputs:
      MATRIX: ${{ steps.prep_dates.outputs.MATRIX_PARAMS_COMBINATIONS }}
      DATE_COUNT: ${{ steps.prep_dates.outputs.DATE_COUNT }}
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install Conda environment with Micromamba
        uses: mamba-org/setup-micromamba@v3
        with:
          cache-environment: true
          environment-file: environment.yml

      - name: Install deep-snow
        run: |
          pip install .

      - name: Select dates over time range
        id: prep_dates
        run: | 
          python -u scripts/actions/prep_time_series.py ${{ inputs.begin_date }} ${{ inputs.end_date }}  ${{ inputs.snow_off_day }}

      - name: Summarize Time-Series Request
        run: |
          {
            echo "## Snow Depth Time-Series Request"
            echo ""
            echo "- Begin date: \`${{ inputs.begin_date }}\`"
            echo "- End date: \`${{ inputs.end_date }}\`"
            echo "- Snow-off day: \`${{ inputs.snow_off_day }}\`"
            echo "- AOI: \`${{ inputs.aoi }}\`"
            echo "- Cloud cover threshold: \`${{ inputs.cloud_cover }}\`"
            echo "- Sentinel-1 orbit selection: \`${{ inputs.s1_orbit_selection }}\`"
            echo "- Acquisition selection strategy: \`${{ inputs.selection_strategy }}\`"
            echo "- Use ensemble: \`${{ inputs.use_ensemble }}\`"
            echo "- Predict SWE and density: \`${{ inputs.predict_swe }}\`"
            echo "- Date count: \`${{ steps.prep_dates.outputs.DATE_COUNT }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
  # A matrix job that calls a reuseable workflow
  prep_tiles:
    needs: prep_dates
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prep_dates.outputs.MATRIX) }}
    name: ${{ matrix.target_date }}
    uses: ./.github/workflows/batch_predict_sd.yml
    with:
      target_date: ${{ matrix.target_date }}
      snow_off_date: ${{ matrix.snow_off_date }} 
      aoi: ${{ inputs.aoi }}
      cloud_cover: ${{ inputs.cloud_cover }}
      selection_strategy: ${{ inputs.selection_strategy }}
      s1_orbit_selection: ${{ inputs.s1_orbit_selection }}
      use_ensemble: ${{ inputs.use_ensemble }}
      predict_swe: ${{ inputs.predict_swe }}
